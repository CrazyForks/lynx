enableTouchRefactor:
  description: Default value is false. If this flag is true, the external gesture which's state is possible or began will not cancel the Lynx iOS touch gesture see issue:#7920.
  defaultValue: true
  valueType: bool
  syncTo:
    - script
enableEndGestureAtLastFingerUp:
  description: In the previous commit, when determining whether all fingers had moved off the screen in multiple touch scenarios, touch.view was used for judgment. However, in a scrolling container, touch.view obtained from touchesEnd/touchesMove could be nil, resulting in incorrect judgment of whether all fingers had moved off the screen. _touches could not be cleared, leading to a subsequent failure to trigger tap events. To fix this issue, we added null checks before calling touch.view, and ended the gesture if _touches was empty. This resolved the problem. Only for ios, detail can see f-12375631 and its mr.
  defaultValue: false
  valueType: bool
  syncTo:
    - script
